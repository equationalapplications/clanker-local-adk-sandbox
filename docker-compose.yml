version: "3.8"
services:
  agent:
    build:
      context: ./functions
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_GENAI_API_KEY=${GOOGLE_API_KEY}
      - SQLITE_PATH=file:/data/local_dev.sqlite
      - ADK_HOST=0.0.0.0
    volumes:
      - ./functions:/app
      - /app/node_modules
      - wikidata:/data
volumes:
  wikidata:
